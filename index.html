<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arquiteto de Plantas</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0a0f1a;
            --bg-card: #111827;
            --bg-input: #1a2332;
            --border: #1e3a5f;
            --border-hover: #2d5a8e;
            --accent: #00d4ff;
            --accent2: #0099cc;
            --accent-glow: rgba(0,212,255,0.15);
            --text: #e8f0f8;
            --text-dim: #7a8fa6;
            --text-label: #9cb3cc;
            --success: #22c55e;
            --warn: #f59e0b;
            --danger: #ef4444;
            --grid-line: rgba(0,160,220,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
                background-size: 40px 40px;
                pointer-events: none;
                z-index: 0;
            }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
        }

        .app-header {
            text-align: center;
            padding: 20px 0 14px;
        }

            .app-header h1 {
                font-family: 'Libre Baskerville', serif;
                font-size: 1.8rem;
                color: var(--accent);
                letter-spacing: 2px;
                text-shadow: 0 0 30px rgba(0,212,255,0.3);
            }

            .app-header p {
                color: var(--text-dim);
                margin-top: 4px;
                font-size: 0.9rem;
            }

        /* STEPPER */
        .stepper {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 16px 0 20px;
            flex-wrap: wrap;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-dim);
            transition: all 0.3s;
            cursor: pointer;
        }

            .step-item.active {
                background: var(--accent-glow);
                color: var(--accent);
                border: 1px solid rgba(0,212,255,0.3);
            }

            .step-item.completed {
                color: var(--success);
            }

            .step-item .step-num {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.72rem;
                font-weight: 700;
                border: 2px solid var(--border);
                transition: all 0.3s;
            }

            .step-item.active .step-num {
                border-color: var(--accent);
                background: rgba(0,212,255,0.15);
            }

            .step-item.completed .step-num {
                border-color: var(--success);
                background: rgba(34,197,94,0.15);
            }

        .step-connector {
            width: 24px;
            height: 2px;
            background: var(--border);
            margin: 0 2px;
        }

            .step-connector.completed {
                background: var(--success);
            }

        /* MAIN LAYOUT */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 20px;
            align-items: start;
        }

        @media(max-width:860px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* FORM PANEL */
        .form-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

            .form-panel::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
            }

            .form-panel h2 {
                font-family: 'Libre Baskerville', serif;
                font-size: 1.15rem;
                color: var(--accent);
                margin-bottom: 4px;
            }

            .form-panel .subtitle {
                color: var(--text-dim);
                font-size: 0.85rem;
                margin-bottom: 20px;
            }

        .form-group {
            margin-bottom: 14px;
        }

            .form-group label {
                display: block;
                font-size: 0.82rem;
                color: var(--text-label);
                margin-bottom: 5px;
                font-weight: 500;
            }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 11px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

            input:focus, select:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-glow);
            }

        select {
            cursor: pointer;
        }

        .radio-group {
            display: flex;
            gap: 8px;
        }

        .radio-option {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            color: var(--text-dim);
            transition: all 0.2s;
        }

            .radio-option:hover {
                border-color: var(--border-hover);
            }

            .radio-option.selected {
                border-color: var(--accent);
                background: var(--accent-glow);
                color: var(--accent);
            }

        /* BUTTONS */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #000;
            flex: 1;
        }

            .btn-primary:hover {
                box-shadow: 0 4px 20px rgba(0,212,255,0.3);
                transform: translateY(-1px);
            }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

            .btn-secondary:hover {
                border-color: var(--border-hover);
                color: var(--text);
            }

        .btn-sm {
            padding: 7px 12px;
            font-size: 0.8rem;
        }

        /* PREVIEW PANEL */
        .preview-panel {
            background: #0a1628;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            position: sticky;
            top: 16px;
        }

        .preview-header {
            padding: 10px 16px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }

            .preview-header h3 {
                font-size: 0.85rem;
                color: var(--text-label);
                font-weight: 500;
            }

        .preview-tools {
            display: flex;
            gap: 4px;
            align-items: center;
        }

            .preview-tools .tool-btn {
                padding: 5px 10px;
                border-radius: 6px;
                font-size: 0.75rem;
                background: var(--bg-input);
                color: var(--text-dim);
                border: 1px solid var(--border);
                cursor: pointer;
                transition: all 0.2s;
                font-family: 'DM Sans', sans-serif;
            }

                .preview-tools .tool-btn.active, .preview-tools .tool-btn:hover {
                    background: var(--accent-glow);
                    color: var(--accent);
                    border-color: var(--accent);
                }

        .floor-tabs {
            display: flex;
            gap: 4px;
        }

        .floor-tab {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            background: var(--bg-input);
            color: var(--text-dim);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

            .floor-tab.active {
                background: var(--accent-glow);
                color: var(--accent);
                border-color: var(--accent);
            }

        .canvas-wrap {
            position: relative;
            width: 100%;
            padding-bottom: 75%;
            overflow: hidden;
            cursor: default;
            touch-action: none;
        }

            .canvas-wrap canvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

        /* CANVAS HINT */
        .canvas-hint {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: var(--text-dim);
            font-size: 0.72rem;
            padding: 4px 12px;
            border-radius: 10px;
            pointer-events: none;
            transition: opacity 0.3s;
            white-space: nowrap;
        }

        /* ROOM LIST */
        .room-list {
            margin-top: 14px;
        }

        .room-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 6px;
            transition: all 0.2s;
            cursor: pointer;
        }

            .room-item:hover, .room-item.selected {
                border-color: var(--accent);
            }

            .room-item.selected {
                background: var(--accent-glow);
            }

        .room-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .room-info {
            flex: 1;
        }

            .room-info .room-name {
                font-size: 0.85rem;
                font-weight: 500;
            }

            .room-info .room-dims {
                font-size: 0.75rem;
                color: var(--text-dim);
            }

        .room-item .remove-room {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

            .room-item .remove-room:hover {
                color: var(--danger);
                background: rgba(239,68,68,0.1);
            }

        /* AREA INFO */
        .area-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
            padding: 12px;
            background: rgba(0,212,255,0.04);
            border: 1px solid rgba(0,212,255,0.1);
            border-radius: 8px;
        }

        .area-stat {
            text-align: center;
        }

            .area-stat .val {
                font-size: 1rem;
                font-weight: 700;
                color: var(--accent);
            }

            .area-stat .lbl {
                font-size: 0.7rem;
                color: var(--text-dim);
                margin-top: 2px;
            }

        .area-warn {
            grid-column: 1/-1;
            text-align: center;
            color: var(--danger);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 5px;
            background: rgba(239,68,68,0.08);
            border-radius: 6px;
        }

        .area-ok {
            grid-column: 1/-1;
            text-align: center;
            color: var(--success);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 5px;
            background: rgba(34,197,94,0.08);
            border-radius: 6px;
        }

        /* SUMMARY */
        .summary-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

            .summary-card h3 {
                font-family: 'Libre Baskerville', serif;
                font-size: 0.95rem;
                color: var(--accent);
                margin-bottom: 10px;
            }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }

            .summary-row:last-child {
                border-bottom: none;
            }

            .summary-row .s-label {
                color: var(--text-dim);
            }

            .summary-row .s-value {
                color: var(--text);
                font-weight: 600;
            }

        /* PRESETS */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 14px;
        }

        .preset-btn {
            padding: 8px 6px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

            .preset-btn:hover {
                border-color: var(--accent);
                color: var(--accent);
                background: var(--accent-glow);
            }

            .preset-btn i {
                display: block;
                font-size: 1rem;
                margin-bottom: 3px;
            }

        .export-row {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.2s;
        }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            max-width: 380px;
            width: 100%;
            animation: slideUp 0.25s;
        }

            .modal-box h3 {
                font-family: 'Libre Baskerville', serif;
                color: var(--accent);
                margin-bottom: 8px;
            }

            .modal-box p {
                color: var(--text-dim);
                font-size: 0.88rem;
                margin-bottom: 16px;
                line-height: 1.5;
            }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* LEGEND */
        .legend {
            display: flex;
            gap: 12px;
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .legend-swatch {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        @keyframes fadeIn {
            from { opacity: 0 }
            to { opacity: 1 }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0 }
            to { transform: translateY(0); opacity: 1 }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

            .modal-input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-glow);
            }

        .modal-input-label {
            font-size: 0.8rem;
            color: var(--text-label);
            margin-bottom: 6px;
            display: block;
        }

        .modal-loading {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0 4px;
            color: var(--text-dim);
            font-size: 0.88rem;
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 2.5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            flex-shrink: 0;
        }

        .modal-prompt-preview {
            font-size: 0.72rem;
            color: var(--text-dim);
            opacity: 0.55;
            margin-top: 8px;
            word-break: break-word;
            line-height: 1.4;
            font-style: italic;
        }

        .modal-img-preview {
            width: 100%;
            border-radius: 8px;
            margin: 12px 0;
            border: 1px solid var(--border);
        }

        .token-config-btn {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 50;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 7px 13px;
            border-radius: 8px;
            font-size: 0.76rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

            .token-config-btn:hover {
                border-color: var(--accent);
                color: var(--accent);
                box-shadow: 0 0 12px rgba(0,212,255,0.15);
            }

            .token-config-btn.has-token {
                border-color: rgba(34,197,94,0.4);
                color: var(--success);
            }

        /* Responsive */
        @media(max-width:600px) {
            .app-container {
                padding: 10px;
            }

            .form-panel {
                padding: 16px;
            }

            .app-header h1 {
                font-size: 1.3rem;
            }

            .step-item span {
                display: none;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .preset-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1><i class="fas fa-drafting-compass"></i> Arquiteto de Plantas</h1>
            <p>Projete a planta da sua casa passo a passo</p>
        </header>
        <nav class="stepper" id="stepper"></nav>
        <div class="main-layout">
            <div class="form-panel" id="formPanel"></div>
            <div class="preview-panel">
                <div class="preview-header">
                    <h3><i class="fas fa-eye"></i> Visualização</h3>
                    <div class="preview-tools" id="previewTools"></div>
                    <div class="floor-tabs" id="floorTabs"></div>
                </div>
                <div class="canvas-wrap" id="canvasWrap">
                    <canvas id="bp"></canvas>
                    <div class="canvas-hint" id="canvasHint"></div>
                </div>
                <div class="legend" id="legend"></div>
            </div>
        </div>
    </div>
    <div id="modalContainer"></div>
    <button class="token-config-btn" id="tokenConfigBtn" title="Configurar Token POE API">
        <i class="fas fa-key"></i> Token POE
    </button>

    <script>
(function() {
  "use strict";

  /* ── dark mode ── */
  if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
    document.documentElement.classList.add("dark");
  }
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(e) {
    document.documentElement.classList.toggle("dark", e.matches);
  });

  /* ── constants ── */
  var SNAP = 0.25;                       // snap grid in meters
  var HANDLE = 7;                        // resize-handle radius in CSS px
  var MIN_ROOM = 1;                      // min room dimension in meters
  var ROOM_COLORS = [
    "#3b82f6","#22c55e","#f59e0b","#ef4444","#8b5cf6",
    "#ec4899","#14b8a6","#f97316","#06b6d4","#84cc16",
    "#e11d48","#6366f1","#0ea5e9","#a855f7","#10b981"
  ];
  var PRESETS = [
    {name:"Sala",       icon:"fa-couch",          w:4,   d:5  },
    {name:"Quarto",     icon:"fa-bed",            w:3,   d:4  },
    {name:"Cozinha",    icon:"fa-utensils",        w:3,   d:3.5},
    {name:"Banheiro",   icon:"fa-bath",           w:2,   d:2.5},
    {name:"Garagem",    icon:"fa-car",            w:3,   d:6  },
    {name:"Escritório", icon:"fa-laptop",         w:3,   d:3  },
    {name:"Lavanderia", icon:"fa-shirt",          w:2.5, d:2  },
    {name:"Varanda",    icon:"fa-umbrella-beach", w:2,   d:4  },
    {name:"Despensa",   icon:"fa-box",            w:1.5, d:2  }
  ];
  var STEPS = [
    {label:"Terreno",  icon:"fa-expand"},
    {label:"Recuos",   icon:"fa-arrows-alt"},
    {label:"Andares",  icon:"fa-layer-group"},
    {label:"Cômodos",  icon:"fa-door-open"},
    {label:"Resumo",   icon:"fa-check-circle"}
  ];

  /* ── state ── */
  var S = {
    step: 0,
    terrain: {width:10, depth:20, type:"gramado"},
    setbacks: {front:3, back:5, left:1.5, right:1.5, lateralMode:"ambos"},
    floors: 1,
    rooms: {},          // rooms[floorIdx] = [{name,w,d,x,y,color}, ...]
    viewFloor: 0,
    sel: -1,            // selected room index
    tool: "move"        // "move" | "resize"
  };

  /* ── interaction state ── */
  var drag = {
    active: false,
    type: null,         // "move" | "n" | "s" | "e" | "w" | "ne" | "nw" | "se" | "sw"
    ri: -1,
    startMX: 0, startMY: 0,
    origX: 0, origY: 0, origW: 0, origD: 0,
    hasMoved: false
  };

  /* ── cached transform  (canvas px ↔ meters) ── */
  var T = {ox:0, oy:0, scale:1, bx:0, by:0, bw:0, bh:0, cw:0, ch:0, dpr:1};

  /* ── DOM ── */
  var stepperEl     = document.getElementById("stepper");
  var formPanel     = document.getElementById("formPanel");
  var floorTabsEl   = document.getElementById("floorTabs");
  var previewTools  = document.getElementById("previewTools");
  var canvasWrap    = document.getElementById("canvasWrap");
  var canvas        = document.getElementById("bp");
  var ctx           = canvas.getContext("2d");
  var hintEl        = document.getElementById("canvasHint");
  var legendEl      = document.getElementById("legend");
  var modalCont     = document.getElementById("modalContainer");

  /* ── helpers ── */
  function ua() {
    var w = S.terrain.width - S.setbacks.left - S.setbacks.right;
    var d = S.terrain.depth - S.setbacks.front - S.setbacks.back;
    return {width: Math.max(0,w), depth: Math.max(0,d)};
  }
  function totalArea(fi) {
    var r = S.rooms[fi] || [], t = 0;
    for (var i=0;i<r.length;i++) t += r[i].w * r[i].d;
    return t;
  }
  function snap(v) { return Math.round(v / SNAP) * SNAP; }
  function clamp(v,lo,hi) { return Math.max(lo, Math.min(hi, v)); }
  function hexRgba(h,a) {
    return "rgba("+parseInt(h.slice(1,3),16)+","+parseInt(h.slice(3,5),16)+","+parseInt(h.slice(5,7),16)+","+a+")";
  }
  function nextColor() {
    var c=0;
    for (var f in S.rooms) c += S.rooms[f].length;
    return ROOM_COLORS[c % ROOM_COLORS.length];
  }

  /* find a free spot for a new room (simple scan) */
  function findFreeSpot(w, d) {
    var u = ua();
    var rooms = S.rooms[S.viewFloor] || [];
    for (var cy = 0; cy <= u.depth - d; cy += SNAP) {
      for (var cx = 0; cx <= u.width - w; cx += SNAP) {
        var ok = true;
        for (var i = 0; i < rooms.length; i++) {
          var r = rooms[i];
          if (cx < r.x + r.w && cx + w > r.x && cy < r.y + r.d && cy + d > r.y) { ok = false; break; }
        }
        if (ok) return {x:cx, y:cy};
      }
    }
    return {x:0, y:0};
  }

  function showModal(title, msg, onOk, onCancel) {
    var h = '<div class="modal-overlay" id="activeModal"><div class="modal-box"><h3>'+title+'</h3><p>'+msg+'</p><div class="modal-actions">';
    if (onCancel) h += '<button class="btn btn-secondary btn-sm" id="mCancel">Cancelar</button>';
    h += '<button class="btn btn-primary btn-sm" id="mOk">OK</button></div></div></div>';
    modalCont.innerHTML = h;
    document.getElementById("mOk").onclick = function(){ modalCont.innerHTML=""; if(onOk) onOk(); };
    if (onCancel) document.getElementById("mCancel").onclick = function(){ modalCont.innerHTML=""; onCancel(); };
    document.getElementById("activeModal").onclick = function(e){ if(e.target===this){ modalCont.innerHTML=""; if(onCancel) onCancel(); }};
  }

  /* ── POE Token management ── */
  function getPoeToken() {
    return localStorage.getItem("poeApiToken") || "";
  }

  function updateTokenBtn() {
    var btn = document.getElementById("tokenConfigBtn");
    if (!btn) return;
    if (getPoeToken()) {
      btn.classList.add("has-token");

    } else {
      btn.classList.remove("has-token");
      btn.title = "Configurar Token POE API";
    }
  }

  function showTokenModal(afterSave) {

      'Obtenha em <a href="https://poe.com" target="_blank" style="color:var(--accent)">poe.com</a> → Settings → API.</p>' +
      '<label class="modal-input-label">Token de acesso</label>' +
      '<input type="password" id="poeTokenInput" class="modal-input" placeholder="Cole aqui o seu token POE..." value="' + existing + '">' +
      (existing ? '<p style="font-size:0.75rem;color:var(--success);margin-top:-10px;margin-bottom:12px"><i class="fas fa-check-circle"></i> Token atual: ' + masked + '</p>' : '') +
      '<div class="modal-actions">' +
      '<button class="btn btn-secondary btn-sm" id="mTokenSkip">Pular</button>' +

  /* ── Build architectural prompt from current state ── */
  function buildArchitecturalPrompt() {
    var u = ua();
    var allRoomDesc = [];

    for (var f = 0; f < S.floors; f++) {
      var floorRooms = S.rooms[f] || [];
      var floorLabel = f === 0 ? "pavimento térreo" : (f + 1) + "º pavimento";
      for (var i = 0; i < floorRooms.length; i++) {
        var r = floorRooms[i];
        var relX = u.width > 0 ? (r.x + r.w / 2) / u.width : 0.5;
        var relY = u.depth > 0 ? (r.y + r.d / 2) / u.depth : 0.5;
        var posH = relX < 0.35 ? "lado esquerdo" : relX > 0.65 ? "lado direito" : "centro";
        var posV = relY < 0.35 ? "zona da frente" : relY > 0.65 ? "zona do fundo" : "zona central";
        var area = (r.w * r.d).toFixed(1);
        allRoomDesc.push(r.name + " (" + r.w + "m × " + r.d + "m, " + area + "m², " + posV + ", " + posH + ", " + floorLabel + ")");
      }
    }

    var frontSetback = S.setbacks.front;
    var backSetback  = S.setbacks.back;
    var u2 = ua();
    var buildableArea = (u2.width * u2.depth).toFixed(1);

    var prompt =
      "Professional architectural floor plan. Draw a realistic, detailed, top-down orthographic floor plan as a seasoned architect would produce. " +
      "Property details: terrain " + S.terrain.width + "m wide × " + S.terrain.depth + "m deep (" + S.terrain.type + "). " +
      "Building setbacks: " + frontSetback + "m front (street-facing facade, bottom of drawing), " + backSetback + "m rear (top of drawing), " +
      S.setbacks.left + "m left side, " + S.setbacks.right + "m right side. Buildable area: " + buildableArea + "m². " +
      "Total floors: " + S.floors + ". " +
      "IMPORTANT: The FRONT of the house (main facade) faces the street and should be drawn at the BOTTOM of the image. The BACK of the house is at the TOP. " +
      "Rooms to draw: " + (allRoomDesc.length ? allRoomDesc.join("; ") : "open plan") + ". " +
      "Drawing requirements: thick black structural walls (20-25cm), precise room boundaries, door swings with arcs, windows shown as gaps with double lines in walls, dimension annotations for each room, room name labels with area in m², staircase if multiple floors, north arrow compass rose (north pointing up/rear), title block. " +
      "Style: clean white/light grey background, black ink technical drawing, professional drafting standards, accurate proportions, realistic wall thickness, no furniture inside rooms, pure architectural plan view. " +
      "The layout must respect the given room positions relative to front/back/left/right as described.";

    return prompt;
  }

  /* ════════════════════════════════
     CANVAS COORDINATE TRANSFORMS
     ════════════════════════════════ */
  function updateTransform() {
    var wrap = canvasWrap.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = wrap.width * dpr;
    canvas.height = wrap.height * dpr;
    var cw = wrap.width, ch = wrap.height;
    var pad = 36;
    var tw = S.terrain.width, td = S.terrain.depth;
    var sc = Math.min((cw - pad*2) / tw, (ch - pad*2) / td);
    var ox = (cw - tw*sc) / 2;
    var oy = (ch - td*sc) / 2;
    var u = ua();
    T = {
      ox:ox, oy:oy, scale:sc,
      bx: ox + S.setbacks.left * sc,
      by: oy + S.setbacks.front * sc,
      bw: u.width * sc,
      bh: u.depth * sc,
      cw:cw, ch:ch, dpr:dpr
    };
  }

  /* canvas CSS-px → meters inside buildable area */
  function px2m(cx, cy) {
    return { mx: (cx - T.bx) / T.scale, my: (cy - T.by) / T.scale };
  }
  /* meters → canvas CSS-px */
  function m2px(mx, my) {
    return { px: T.bx + mx * T.scale, py: T.by + my * T.scale };
  }

  /* ════════════════════════════════
     HIT TESTING
     ════════════════════════════════ */
  function getCanvasXY(e) {
    var rect = canvas.getBoundingClientRect();
    var touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  /* returns {ri, handle} or null */
  function hitTest(cx, cy) {
    var rooms = S.rooms[S.viewFloor] || [];
    // check selected room handles first
    if (S.sel >= 0 && S.sel < rooms.length) {
      var h = getHandle(rooms[S.sel], cx, cy);
      if (h) return {ri: S.sel, handle: h};
    }
    // then check body hits (reverse order = top first)
    for (var i = rooms.length - 1; i >= 0; i--) {
      var r = rooms[i];
      var p = m2px(r.x, r.y);
      var rw = r.w * T.scale, rd = r.d * T.scale;
      if (cx >= p.px && cx <= p.px + rw && cy >= p.py && cy <= p.py + rd) {
        return {ri: i, handle: "move"};
      }
    }
    return null;
  }

  /* check if (cx,cy) hits a resize handle of room r */
  function getHandle(r, cx, cy) {
    var p = m2px(r.x, r.y);
    var rw = r.w * T.scale, rd = r.d * T.scale;
    var H = HANDLE + 2; // tolerance
    // edges midpoints
    var edges = [
      {id:"n",  x: p.px + rw/2,     y: p.py},
      {id:"s",  x: p.px + rw/2,     y: p.py + rd},
      {id:"w",  x: p.px,            y: p.py + rd/2},
      {id:"e",  x: p.px + rw,       y: p.py + rd/2}
    ];
    // corners
    var corners = [
      {id:"nw", x: p.px,        y: p.py},
      {id:"ne", x: p.px + rw,   y: p.py},
      {id:"sw", x: p.px,        y: p.py + rd},
      {id:"se", x: p.px + rw,   y: p.py + rd}
    ];
    var all = corners.concat(edges);
    for (var i = 0; i < all.length; i++) {
      if (Math.abs(cx - all[i].x) < H && Math.abs(cy - all[i].y) < H) return all[i].id;
    }
    return null;
  }

  function handleCursor(handle) {
    var map = {n:"ns-resize",s:"ns-resize",w:"ew-resize",e:"ew-resize",
               nw:"nwse-resize",se:"nwse-resize",ne:"nesw-resize",sw:"nesw-resize",
               move:"grab"};
    return map[handle] || "default";
  }

  /* ════════════════════════════════
     CANVAS INTERACTION (mouse+touch)
     ════════════════════════════════ */
  function onPointerDown(e) {
    if (S.step < 3) return;
    var pt = getCanvasXY(e);
    var hit = hitTest(pt.x, pt.y);
    if (!hit) { S.sel = -1; drawCanvas(); renderForm(); return; }

    S.sel = hit.ri;
    var r = S.rooms[S.viewFloor][hit.ri];
    drag = {
      active: true,
      type: hit.handle,
      ri: hit.ri,
      startMX: pt.x, startMY: pt.y,
      origX: r.x, origY: r.y, origW: r.w, origD: r.d,
      hasMoved: false
    };
    canvasWrap.style.cursor = handleCursor(hit.handle);
    if (hit.handle === "move") canvasWrap.style.cursor = "grabbing";

    drawCanvas();
    renderForm();
    e.preventDefault();
  }

  function onPointerMove(e) {
    var pt = getCanvasXY(e);

    if (drag.active) {
      drag.hasMoved = true;
      var dx = (pt.x - drag.startMX) / T.scale;
      var dy = (pt.y - drag.startMY) / T.scale;
      var r = S.rooms[S.viewFloor][drag.ri];
      var u = ua();

      if (drag.type === "move") {
        r.x = snap(clamp(drag.origX + dx, 0, u.width - r.w));
        r.y = snap(clamp(drag.origY + dy, 0, u.depth - r.d));
      } else {
        // resize
        var nx = drag.origX, ny = drag.origY, nw = drag.origW, nd = drag.origD;
        if (drag.type.indexOf("e") >= 0) {
          nw = snap(clamp(drag.origW + dx, MIN_ROOM, u.width - drag.origX));
        }
        if (drag.type.indexOf("w") >= 0) {
          var newX = snap(clamp(drag.origX + dx, 0, drag.origX + drag.origW - MIN_ROOM));
          nw = drag.origW + (drag.origX - newX);
          nx = newX;
        }
        if (drag.type.indexOf("s") >= 0) {
          nd = snap(clamp(drag.origD + dy, MIN_ROOM, u.depth - drag.origY));
        }
        if (drag.type.indexOf("n") >= 0) {
          var newY = snap(clamp(drag.origY + dy, 0, drag.origY + drag.origD - MIN_ROOM));
          nd = drag.origD + (drag.origY - newY);
          ny = newY;
        }
        r.x = nx; r.y = ny; r.w = Math.max(MIN_ROOM, nw); r.d = Math.max(MIN_ROOM, nd);
      }

      drawCanvas();
      updateRoomListHighlight();
      e.preventDefault();
      return;
    }

    // hover cursor
    if (S.step >= 3) {
      var hit = hitTest(pt.x, pt.y);
      canvasWrap.style.cursor = hit ? handleCursor(hit.handle) : "default";
    }
  }

  function onPointerUp(e) {
    if (!drag.active) return;
    drag.active = false;
    canvasWrap.style.cursor = "default";

    // snap final values
    var r = S.rooms[S.viewFloor][drag.ri];
    r.x = snap(r.x); r.y = snap(r.y);
    r.w = snap(r.w); r.d = snap(r.d);
    if (r.w < MIN_ROOM) r.w = MIN_ROOM;
    if (r.d < MIN_ROOM) r.d = MIN_ROOM;

    drawCanvas();
    renderForm();
    e.preventDefault();
  }

  canvas.addEventListener("mousedown", onPointerDown);
  canvas.addEventListener("mousemove", onPointerMove);
  canvas.addEventListener("mouseup", onPointerUp);
  canvas.addEventListener("mouseleave", onPointerUp);
  canvas.addEventListener("touchstart", function(e) { if (e.touches.length===1) onPointerDown(e); }, {passive:false});
  canvas.addEventListener("touchmove", function(e) { if (e.touches.length===1) onPointerMove(e); }, {passive:false});
  canvas.addEventListener("touchend", onPointerUp);
  canvas.addEventListener("touchcancel", onPointerUp);

  /* ════════════════════════════════
     CANVAS DRAWING
     ════════════════════════════════ */
  function drawCanvas() {
    updateTransform();
    ctx.setTransform(T.dpr, 0, 0, T.dpr, 0, 0);
    var cw = T.cw, ch = T.ch;

    // bg
    ctx.fillStyle = "#0a1628";
    ctx.fillRect(0, 0, cw, ch);

    // fine grid
    ctx.strokeStyle = "rgba(0,140,200,0.05)";
    ctx.lineWidth = 0.5;
    for (var gx = 0; gx < cw; gx += 20) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,ch); ctx.stroke(); }
    for (var gy = 0; gy < ch; gy += 20) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(cw,gy); ctx.stroke(); }

    var tw = S.terrain.width, td = S.terrain.depth, sc = T.scale, ox = T.ox, oy = T.oy;

    // terrain
    var isGrass = S.terrain.type === "gramado";
    ctx.fillStyle = isGrass ? "rgba(34,197,94,0.05)" : "rgba(180,130,60,0.05)";
    ctx.fillRect(ox, oy, tw*sc, td*sc);
    ctx.strokeStyle = isGrass ? "rgba(34,197,94,0.45)" : "rgba(180,130,60,0.45)";
    ctx.lineWidth = 2; ctx.setLineDash([]); ctx.strokeRect(ox, oy, tw*sc, td*sc);

    // dimension labels on terrain
    ctx.font = "11px DM Sans"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = isGrass ? "rgba(34,197,94,0.75)" : "rgba(180,130,60,0.75)";
    ctx.fillText(tw+"m", ox + tw*sc/2, oy - 10);
    ctx.save(); ctx.translate(ox - 12, oy + td*sc/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(td+"m", 0, 0); ctx.restore();

    // setback area
    if (S.step >= 1) {
      var bx = T.bx, by = T.by, bw = T.bw, bh = T.bh;
      ctx.fillStyle = "rgba(245,158,11,0.03)";
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = "rgba(245,158,11,0.45)";
      ctx.lineWidth = 1.5; ctx.setLineDash([6,4]);
      ctx.strokeRect(bx, by, bw, bh);
      ctx.setLineDash([]);

      // setback dim lines
      var sf = S.setbacks.front, sb = S.setbacks.back;
      if (sf > 0) dimLine(bx+bw/2, oy, bx+bw/2, by, sf+"m");
      if (sb > 0) dimLine(bx+bw/2, by+bh, bx+bw/2, oy+td*sc, sb+"m");

      // meter grid inside buildable area
      if (S.step >= 3) {
        ctx.strokeStyle = "rgba(0,180,255,0.06)";
        ctx.lineWidth = 0.5;
        for (var mx = 0; mx <= ua().width; mx += 1) {
          var lx = bx + mx*sc;
          ctx.beginPath(); ctx.moveTo(lx, by); ctx.lineTo(lx, by+bh); ctx.stroke();
        }
        for (var my = 0; my <= ua().depth; my += 1) {
          var ly = by + my*sc;
          ctx.beginPath(); ctx.moveTo(bx, ly); ctx.lineTo(bx+bw, ly); ctx.stroke();
        }
      }

      // rooms
      if (S.step >= 3) {
        var rooms = S.rooms[S.viewFloor] || [];
        for (var i = 0; i < rooms.length; i++) {
          drawRoom(rooms[i], i === S.sel);
        }
      }
    }

    // compass
    drawCompass(cw - 30, ch - 30);

    // hint
    updateHint();
  }

  function drawRoom(r, selected) {
    var p = m2px(r.x, r.y);
    var rw = r.w * T.scale, rd = r.d * T.scale;
    var col = r.color;

    // fill
    ctx.fillStyle = hexRgba(col, selected ? 0.2 : 0.1);
    ctx.fillRect(p.px, p.py, rw, rd);

    // hatching
    ctx.save();
    ctx.beginPath(); ctx.rect(p.px, p.py, rw, rd); ctx.clip();
    ctx.strokeStyle = hexRgba(col, 0.06);
    ctx.lineWidth = 1;
    for (var h = -rw; h < rw+rd; h += 10) {
      ctx.beginPath(); ctx.moveTo(p.px+h, p.py); ctx.lineTo(p.px+h+rd, p.py+rd); ctx.stroke();
    }
    ctx.restore();

    // border
    ctx.strokeStyle = hexRgba(col, selected ? 1 : 0.7);
    ctx.lineWidth = selected ? 2.5 : 1.5;
    ctx.strokeRect(p.px, p.py, rw, rd);

    // glow if selected
    if (selected) {
      ctx.shadowColor = col; ctx.shadowBlur = 12;
      ctx.strokeRect(p.px, p.py, rw, rd);
      ctx.shadowBlur = 0;
    }

    // label
    ctx.font = "bold 10px DM Sans"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    var ltw = Math.max(ctx.measureText(r.name).width, ctx.measureText(r.w+"×"+r.d).width) + 8;
    var lx = p.px + rw/2, ly = p.py + rd/2;
    ctx.fillStyle = "rgba(10,22,40,0.75)";
    ctx.fillRect(lx - ltw/2, ly - 14, ltw, 26);
    ctx.fillStyle = hexRgba(col, 0.95);
    ctx.fillText(r.name, lx, ly - 4);
    ctx.font = "9px DM Sans";
    ctx.fillStyle = hexRgba(col, 0.6);
    ctx.fillText(r.w+"×"+r.d+"m", lx, ly + 9);

    // resize handles (only when selected)
    if (selected) {
      var handles = [
        {x: p.px,        y: p.py},
        {x: p.px+rw,     y: p.py},
        {x: p.px,        y: p.py+rd},
        {x: p.px+rw,     y: p.py+rd},
        {x: p.px+rw/2,   y: p.py},
        {x: p.px+rw/2,   y: p.py+rd},
        {x: p.px,        y: p.py+rd/2},
        {x: p.px+rw,     y: p.py+rd/2}
      ];
      for (var hi = 0; hi < handles.length; hi++) {
        ctx.fillStyle = "#0a1628";
        ctx.strokeStyle = col;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(handles[hi].x, handles[hi].y, HANDLE, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
      }
    }
  }

  function dimLine(x1,y1,x2,y2,label) {
    ctx.save();
    ctx.strokeStyle = "rgba(245,158,11,0.25)"; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.setLineDash([]);
    var mx=(x1+x2)/2, my=(y1+y2)/2;
    ctx.font="9px DM Sans"; ctx.textAlign="center"; ctx.textBaseline="middle";
    var tw2 = ctx.measureText(label).width + 6;
    ctx.fillStyle="rgba(10,22,40,0.8)"; ctx.fillRect(mx-tw2/2, my-7, tw2, 14);
    ctx.fillStyle="rgba(245,158,11,0.8)"; ctx.fillText(label, mx, my);
    ctx.restore();
  }

  function drawCompass(cx2, cy2) {
    ctx.save();
    ctx.font="bold 9px DM Sans"; ctx.fillStyle="rgba(0,180,255,0.45)"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.beginPath(); ctx.arc(cx2,cy2,12,0,Math.PI*2); ctx.strokeStyle="rgba(0,180,255,0.25)"; ctx.lineWidth=1; ctx.stroke();
    ctx.fillText("N", cx2, cy2-5);
    ctx.font="7px DM Sans"; ctx.fillStyle="rgba(0,180,255,0.25)"; ctx.fillText("S", cx2, cy2+5);
    ctx.beginPath(); ctx.moveTo(cx2,cy2-12); ctx.lineTo(cx2-3,cy2-8); ctx.lineTo(cx2+3,cy2-8); ctx.closePath();
    ctx.fillStyle="rgba(0,180,255,0.45)"; ctx.fill();
    ctx.restore();
  }

  function updateHint() {

  function renderStepper() {

      h += '<div class="step-item '+cls+'" data-si="'+i+'">' +
           '<div class="step-num">'+(i<S.step?'<i class="fas fa-check"></i>':(i+1))+'</div>' +
           '<span>'+STEPS[i].label+'</span></div>';
      if (i < STEPS.length-1) h += '<div class="step-connector '+(i<S.step?"completed":"")+'"></div>';
    }
    stepperEl.innerHTML = h;
    var items = stepperEl.querySelectorAll(".step-item");
    for (var j = 0; j < items.length; j++) {
      items[j].addEventListener("click", (function(idx){ return function(){ if(idx<S.step){S.step=idx; S.sel=-1; fullRender();} }; })(j));

  /* ── BINDERS ── */
  function bindStep0() {
    var tW = document.getElementById("tW"), tD = document.getElementById("tD");
    if (tW) tW.addEventListener("input", function(){ S.terrain.width = parseFloat(this.value)||10; fullRender(); });
    if (tD) tD.addEventListener("input", function(){ S.terrain.depth = parseFloat(this.value)||20; fullRender(); });
    var radios = document.querySelectorAll(".radio-option");
    for (var i=0;i<radios.length;i++) radios[i].addEventListener("click", function(){ S.terrain.type=this.getAttribute("data-val"); fullRender(); });
  }
  function bindStep1() {
    var ids=["sF","sB","sL","sR"], keys=["front","back","left","right"];
    for (var i=0;i<ids.length;i++) (function(idx){
      var el = document.getElementById(ids[idx]);
      if (el) el.addEventListener("input", function(){ S.setbacks[keys[idx]]=parseFloat(this.value)||0; fullRender(); });
    })(i);
  }
  function bindStep2() {
    var sel = document.getElementById("fCount");
    if (sel) sel.addEventListener("change", function(){
      S.floors = parseInt(this.value)||1;
      for (var f=0;f<S.floors;f++) if(!S.rooms[f]) S.rooms[f]=[];
      fullRender();
    });
  }
  function bindStep3() {
    // presets
    var pbtns = document.querySelectorAll(".preset-btn");
    for (var i=0;i<pbtns.length;i++) pbtns[i].addEventListener("click", function(){
      var pi = parseInt(this.getAttribute("data-pi")), pr = PRESETS[pi];
      var n=document.getElementById("rName"), w=document.getElementById("rW"), d=document.getElementById("rD");
      if(n) n.value=pr.name; if(w) w.value=pr.w; if(d) d.value=pr.d;
    });
    // add
    var addBtn = document.getElementById("addRoomBtn");
    if (addBtn) addBtn.addEventListener("click", function(){
      var nEl=document.getElementById("rName"), wEl=document.getElementById("rW"), dEl=document.getElementById("rD");
      var name=(nEl.value||"").trim(), w=parseFloat(wEl.value)||3, d=parseFloat(dEl.value)||4;
      if (!name) { showModal("Nome obrigatório","Por favor, dê um nome ao cômodo."); return; }
      var u2=ua();
      if (w>u2.width||d>u2.depth) { showModal("Dimensão inválida","O cômodo não cabe na área construtível ("+u2.width.toFixed(1)+"m × "+u2.depth.toFixed(1)+"m)."); return; }
      var fi=S.viewFloor;
      if (!S.rooms[fi]) S.rooms[fi]=[];
      var pos = findFreeSpot(w, d);
      S.rooms[fi].push({name:name, w:w, d:d, x:pos.x, y:pos.y, color:nextColor()});
      S.sel = S.rooms[fi].length - 1;
      nEl.value="";
      fullRender();
    });
    // room list click (select)
    var rItems = document.querySelectorAll(".room-item");
    for (var j=0;j<rItems.length;j++) rItems[j].addEventListener("click", function(e){
      if (e.target.closest(".remove-room")) return;
      S.sel = parseInt(this.getAttribute("data-ri"));
      drawCanvas(); renderForm();
    });
    // remove
    var rmBtns = document.querySelectorAll(".remove-room");
    for (var k=0;k<rmBtns.length;k++) rmBtns[k].addEventListener("click", function(e){
      e.stopPropagation();
      var ri = parseInt(this.getAttribute("data-ri"));
      S.rooms[S.viewFloor].splice(ri, 1);
      if (S.sel === ri) S.sel = -1;
      else if (S.sel > ri) S.sel--;
      fullRender();
    });
  }
  function bindStep4() {
    var expBtn = document.getElementById("expBtn");
    if (expBtn) expBtn.addEventListener("click", exportImage);
    var rstBtn = document.getElementById("rstBtn");
    if (rstBtn) rstBtn.addEventListener("click", function(){
      showModal("Novo Projeto","Tem certeza? Todos os dados serão perdidos.", function(){
        S.step=0; S.terrain={width:10,depth:20,type:"gramado"};
        S.setbacks={front:3,back:5,left:1.5,right:1.5,lateralMode:"ambos"};
        S.floors=1; S.rooms={}; S.viewFloor=0; S.sel=-1;
        fullRender();
      }, function(){});
    });
  }
  function bindNav() {
    var next=document.getElementById("nextBtn"), prev=document.getElementById("prevBtn");
    if (next) next.addEventListener("click", function(){
      if (S.step===0 && (S.terrain.width<3||S.terrain.depth<3)) { showModal("Terreno pequeno","O terreno deve ter pelo menos 3m × 3m."); return; }
      if (S.step===1) { var u2=ua(); if(u2.width<=0||u2.depth<=0){ showModal("Recuos inválidos","Recuos excedem o terreno."); return; } }
      if (S.step===2) { for(var f=0;f<S.floors;f++) if(!S.rooms[f]) S.rooms[f]=[]; S.viewFloor=0; }
      S.step = Math.min(S.step+1, STEPS.length-1); S.sel=-1; fullRender();
    });
    if (prev) prev.addEventListener("click", function(){ S.step = Math.max(S.step-1,0); S.sel=-1; fullRender(); });
  }

  function updateRoomListHighlight() {
    var items = document.querySelectorAll(".room-item");
    for (var i=0;i<items.length;i++) {
      items[i].classList.toggle("selected", parseInt(items[i].getAttribute("data-ri"))===S.sel);
      // update dims text
      if (parseInt(items[i].getAttribute("data-ri"))===S.sel && S.sel>=0) {
        var r = S.rooms[S.viewFloor][S.sel];
        if (r) {
          var dimEl = items[i].querySelector(".room-dims");
          if (dimEl) dimEl.textContent = r.w+"m × "+r.d+"m = "+(r.w*r.d).toFixed(1)+" m²";
        }

    // update area stats
    var u2=ua(), usedA=totalArea(S.viewFloor), rem=u2.width*u2.depth-usedA;

    if (vals.length>=2) { vals[0].textContent=usedA.toFixed(1)+" m²"; vals[1].textContent=rem.toFixed(1)+" m²"; }

  /* ── Export via POE API (gpt-image-2) ── */
  function exportImage() {
    var token = getPoeToken();
    if (!token) {
      showTokenModal(function() {
        if (getPoeToken()) exportImage();
      });
      return;
    }

    var prompt = buildArchitecturalPrompt();
    var shortPrompt = prompt.substring(0, 140) + "...";

    modalCont.innerHTML =
      '<div class="modal-overlay" id="activeModal"><div class="modal-box">' +
      '<h3><i class="fas fa-drafting-compass"></i> Gerando Planta com IA</h3>' +
      '<div class="modal-loading"><div class="spinner"></div><span>O arquiteto virtual está desenhando sua planta…</span></div>' +
      '<p class="modal-prompt-preview">' + shortPrompt + '</p>' +
      '</div></div>';

    fetch("https://api.poe.com/v1/responses", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            model: "gpt-image-2",
            input: prompt
        })
    })
    .then(function(res) {
        if (!res.ok) {
            return res.text().then(function(t) {
                throw new Error("HTTP " + res.status + ": " + t);
            });
        }

        return res.json();
    })
    .then(function(data) {
      console.log("Resposta da API:", data);

      // Normalise response — handle OpenAI-style {data:[{url,b64_json}]} and flat {url,b64_json}
      var item = (data.data && data.data[0]) ? data.data[0] : data;
      var b64  = item.b64_json || data.b64_json || null;
      var url  = item.url      || data.url      || null;

      if (b64) {
        // Base64 — download directly
        var a = document.createElement("a");
        a.href = "data:image/png;base64," + b64;
        a.download = "planta-ia.png";
        a.click();
      } else if (url) {
        // URL — show preview modal with download link
        var h = '<div class="modal-overlay" id="activeModal"><div class="modal-box" style="max-width:560px">' +
          '<h3><i class="fas fa-check-circle" style="color:var(--success)"></i> Planta Arquitetônica Gerada!</h3>' +
          '<img src="' + url + '" class="modal-img-preview" alt="Planta Arquitetônica">' +
          '<div class="modal-actions">' +
          '<button class="btn btn-secondary btn-sm" id="mImgClose">Fechar</button>' +
          '<a href="' + url + '" download="planta-ia.png" target="_blank" class="btn btn-primary btn-sm"><i class="fas fa-download"></i> Baixar PNG</a>' +
          '</div></div></div>';
        modalCont.innerHTML = h;
        document.getElementById("mImgClose").onclick = function() { modalCont.innerHTML = ""; };
        document.getElementById("activeModal").onclick = function(e) { if (e.target === this) modalCont.innerHTML = ""; };
      } else {
        console.warn("POE API response:", data);
        showModal("Resposta inesperada", "A API retornou um formato não reconhecido. Verifique o console para detalhes.", null, null);
      }
    })
    .catch(function(err) {
      modalCont.innerHTML = "";
      var msg = err.message || String(err);
      var isAuth = msg.indexOf("401") >= 0 || msg.toLowerCase().indexOf("unauthorized") >= 0;
      showModal(
        "Erro ao gerar imagem",
        isAuth
          ? "Token inválido ou expirado. <button onclick=\"document.getElementById('mOk').click();setTimeout(function(){showTokenModal(null)},100)\" style=\"color:var(--accent);background:none;border:none;cursor:pointer;text-decoration:underline\">Clique aqui para atualizar o token</button>."
          : "Verifique sua conexão e token. <br><small style=\"opacity:0.6\">" + msg + "</small>",
        null, null
      );
    });
  }

  /* ── full render ── */
  function fullRender() {
    renderStepper();
    renderFloorTabs();
    renderForm();
    drawCanvas();
    renderLegend();
  }

  /* ── init ── */
  fullRender();
  updateTokenBtn();

  // Show token modal on first visit (no token saved yet)
  setTimeout(function() {
    if (!getPoeToken()) showTokenModal(null);
  }, 600);

  // Token config button
  var tokenBtn = document.getElementById("tokenConfigBtn");
  if (tokenBtn) tokenBtn.addEventListener("click", function() { showTokenModal(null); });

  var rszT;
  window.addEventListener("resize", function(){ clearTimeout(rszT); rszT=setTimeout(function(){ drawCanvas(); },80); });
})();
    </script>
</body>
</html>
